  * { margin:0; padding:0; box-sizing:border-box; }

  header { background:#0f172a; color:#fff; padding:10px 14px 8px; display:flex; align-items:center; justify-content:space-between; gap:8px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.3); }
  .header-left h1  { font-size:17px; font-weight:700; }
  .header-left .sub{ font-size:11px; color:#94a3b8; margin-top:1px; }
  .header-right { display:flex; flex-direction:row; align-items:center; gap:10px; flex-shrink:0; }
  #clock { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; color:#e2e8f0; letter-spacing:2px; line-height:1; }
  #date-day { font-size:13px; color:#94a3b8; text-align:right; margin-top:2px; line-height:1.5; display:flex; flex-direction:column; align-items:flex-end; }

  .header-next { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .hn-card { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:4px 10px; text-align:right; }
  .hn-card.hn-city  { border-color:rgba(14,165,233,0.5); }
  .hn-card.hn-rinko { border-color:rgba(249,115,22,0.5); }
  .hn-time { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:1px; line-height:1; }
  .hn-city  .hn-time   { color:#7dd3fc; }
  .hn-rinko .hn-time   { color:#fdba74; }
  .hn-remain { font-size:18px; font-weight:600; margin-top:1px; }
  .hn-city  .hn-remain { color:#38bdf8; }
  .hn-rinko .hn-remain { color:#fb923c; }
  .hn-label { font-size:14px; color:#94a3b8; margin-top:1px; }
  .hn-empty { font-size:11px; color:#64748b; }

  #nearest-section { margin:8px 12px 4px; border-radius:12px; overflow:hidden; border:1px solid var(--border); background:var(--card); box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  #nearest-header  { display:flex; align-items:center; justify-content:space-between; padding:7px 14px; background:#1e293b; color:#fff; }
  #nearest-header .nh-title { font-size:12px; font-weight:600; color:#94a3b8; }
  #loc-status { font-size:11px; }
  #loc-status.ok        { color:#34d399; }
  #loc-status.err       { color:#f87171; }
  #loc-status.searching { color:#fbbf24; }

  .stop-card { display:flex; align-items:center; padding:10px 14px; gap:12px; border-bottom:1px solid var(--border); }
  .stop-card:last-child { border-bottom:none; }
  .stop-card.nearest { background:#fefce8; border-left:4px solid #fbbf24; }
  .stop-card.second  { background:#f0fdf4; border-left:4px solid #86efac; }
  .stop-icon { font-size:22px; }
  .stop-info { flex:1; min-width:0; }
  .stop-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stop-badge { display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; margin-left:4px; vertical-align:middle; }
  .badge-nearest { background:#fbbf24; color:#000; }
  .badge-second  { background:#86efac; color:#166534; }
  .stop-label { font-size:11px; color:var(--muted); margin-top:1px; }
  .stop-next  { font-size:12px; margin-top:3px; color:var(--muted); }
  .stop-next strong { font-size:14px; font-weight:700; }
  .stop-card.sc-city  .stop-next strong { color:var(--city); }
  .stop-card.sc-rinko .stop-next strong { color:var(--rinko); }
  .stop-right { text-align:right; flex-shrink:0; }
  .stop-dist { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; }
  .stop-card.sc-city  .stop-dist { color:var(--city-dark); }
  .stop-card.sc-rinko .stop-dist { color:var(--rinko-dark); }
  .stop-dist-unit { font-size:11px; color:var(--muted); }
  #gps-msg { padding:10px 14px; font-size:12px; color:var(--muted); text-align:center; }

  .legend { display:flex; gap:6px; padding:8px 12px 4px; flex-wrap:wrap; }
  .badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; }
  .badge-city  { background:var(--city-light);  color:var(--city-dark);  border:1px solid #bae6fd; }
  .badge-rinko { background:var(--rinko-light); color:var(--rinko-dark); border:1px solid #fed7aa; }
  .badge-dot { width:6px; height:6px; border-radius:50%; }
  .dot-city  { background:var(--city); }
  .dot-rinko { background:var(--rinko); }

  .hour-group { margin-bottom:2px; }
  .hour-label { font-size:11px; font-weight:700; color:var(--muted); padding:5px 4px 2px; letter-spacing:1px; }
  .bus-row { display:flex; align-items:center; background:var(--card); border-radius:8px; padding:8px 12px; border:1px solid var(--border); gap:10px; position:relative; overflow:hidden; }
  .bus-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
  .bus-row.city::before  { background:var(--city); }
  .bus-row.rinko::before { background:var(--rinko); }

  .rinko .row-time { color:var(--rinko-dark); }

  .row-company { font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px; display:inline-block; margin-bottom:1px; }

  footer span { flex:1; }

  #debug-toggle { position:fixed; bottom:36px; right:10px; background:#475569; color:#fff; border:none; border-radius:20px; padding:4px 10px; font-size:10px; cursor:pointer; z-index:200; }
  #debug-toggle.active { background:#dc2626; }

  .dbg-key { color:#94a3b8; min-width:100px; flex-shrink:0; }
  .dbg-val { color:#34d399; word-break:break-all; }
  .dbg-err { color:#f87171; }
  .dbg-title { color:#fbbf24; font-size:10px; font-weight:bold; margin-bottom:4px; }
</style>
</head>

function pad(n){ return String(n).padStart(2,'0'); }
var DOW_JA  = ['日','月','火','水','木','金','土'];
var TYPE_JA = {weekday:'平日', saturday:'土曜', holiday:'休日'};

function getDayType(date){
  var dow=date.getDay();
  var holidays=['2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06'];
  var y=date.getFullYear(), mo=String(date.getMonth()+1).padStart(2,'0'), d=String(date.getDate()).padStart(2,'0');
  if(holidays.indexOf(y+'-'+mo+'-'+d)>=0) return 'holiday';
  if(dow===0) return 'holiday';
  if(dow===6) return 'saturday';
  return 'weekday';
}

function calcDist(lat1,lng1,lat2,lng2){
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function getNextBusMin(stopId,nowMin,type){
  var data=TIMETABLE[stopId]; if(!data) return null;
  var d=data[type]||data.weekday, best=null;
  Object.keys(d).forEach(function(hStr){
    var h=parseInt(hStr);
    d[hStr].forEach(function(m){ var t=h*60+m; if(t>=nowMin&&(best===null||t<best)) best=t; });
  });
  return best;
}

function getBusesForStop(stopId,date){
  var data=TIMETABLE[stopId], type=getDayType(date), d=data[type]||data.weekday;
  var stop=ALL_STOPS.filter(function(s){return s.id===stopId;})[0], list=[];
  Object.keys(d).forEach(function(hStr){
    d[hStr].forEach(function(m){ list.push({h:parseInt(hStr),m:m,company:stop.company,label:stop.label,stop:stop.name,stopId:stopId}); });
  });
  list.sort(function(a,b){return a.h*60+a.m-(b.h*60+b.m);});
  return list;
}

function initGPS(){
  if(!navigator.geolocation){ setLocStatus('err','位置情報非対応'); return; }
  navigator.geolocation.watchPosition(
    function(pos){
      currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      setLocStatus('ok','📍 取得済み');
      document.getElementById('gps-msg').style.display='none';
      render();
      dbLog('GPS',currentPos.lat.toFixed(5)+','+currentPos.lng.toFixed(5));
    },
    function(err){ setLocStatus('err','取得できません'); dbLog('GPS ERR',err.message,true); render(); },
    {enableHighAccuracy:true,maximumAge:10000,timeout:20000}
  );
}

function setLocStatus(cls,text){ var el=document.getElementById('loc-status'); if(el){el.className=cls;el.textContent=text;} }

function renderStopCards(){
  var now=new Date(), nowMin=now.getHours()*60+now.getMinutes(), type=getDayType(now);
  var container=document.getElementById('stop-cards');

  var stopsWithInfo=ALL_STOPS.map(function(s){
    var dist=currentPos?calcDist(currentPos.lat,currentPos.lng,s.lat,s.lng):null;
    var nextT=getNextBusMin(s.id,nowMin,type);
    return {stop:s,dist:dist,nextT:nextT};
  });

  if(currentPos){ stopsWithInfo.sort(function(a,b){return a.dist-b.dist;}); }

  activeStops=stopsWithInfo.slice(0,2).map(function(i){return i.stop.id;});

  var sub=document.getElementById('header-sub');
  if(sub){
    if(currentPos){
      var dirs=stopsWithInfo.slice(0,2).map(function(i){return i.stop.dir;});
      var uniq=dirs.filter(function(v,i,a){return a.indexOf(v)===i;});
      sub.textContent=uniq.join('・')+'方面のバス停が近くにあります';
    } else {
      sub.textContent='位置情報を取得中...（行きを表示中）';
    }
  }

  container.innerHTML='';
  stopsWithInfo.slice(0,2).forEach(function(item,idx){
    var s=item.stop;
    var diff=item.nextT!==null?item.nextT-nowMin:null;
    var nextStr='';
    if(item.nextT===null) nextStr='本日の運行終了';
    else if(diff===0) nextStr='🚌 今すぐ発車';
    else nextStr='<strong>あと'+diff+'分</strong>（'+pad(Math.floor(item.nextT/60))+':'+pad(item.nextT%60)+'）';

    var distStr=item.dist!==null
      ?'<div class="stop-dist">'+(item.dist>=1000?(item.dist/1000).toFixed(1):item.dist)+'</div><div class="stop-dist-unit">'+(item.dist>=1000?'km':'m')+'</div>'
      :'<div class="stop-dist" style="font-size:14px;color:#94a3b8">--</div>';

    var card=document.createElement('div');
    card.className='stop-card sc-'+s.company+' '+(idx===0?'nearest':'second');
    card.innerHTML=
      '<div class="stop-icon">'+(s.company==='city'?'🔵':'🟠')+'</div>'+
      '<div class="stop-info">'+
        '<div class="stop-name">'+s.name+'<span class="stop-badge '+(idx===0?'badge-nearest':'badge-second')+'">'+(idx===0?'最寄り':'2番目')+'</span>'+
          '<span style="font-size:10px;color:#94a3b8;margin-left:4px;">'+s.dir+'</span></div>'+
        '<div class="stop-label">'+s.label+'</div>'+
        '<div class="stop-next">'+nextStr+'</div>'+
      '</div>'+
      '<div class="stop-right">'+distStr+'</div>';
    container.appendChild(card);
  });
}

function render(){
  try{
    var now=new Date(), nowMin=now.getHours()*60+now.getMinutes(), type=getDayType(now);

    document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
    document.getElementById('date-day').innerHTML=
      '<span>'+(now.getMonth()+1)+'/'+now.getDate()+'（'+DOW_JA[now.getDay()]+'）</span>'+
      '<span>'+TYPE_JA[type]+'ダイヤ</span>';

    renderStopCards();

    var buses=[];
    activeStops.forEach(function(id){ getBusesForStop(id,now).forEach(function(b){buses.push(b);}); });
    buses.sort(function(a,b){return a.h*60+a.m-(b.h*60+b.m);});

    var headerNext=document.getElementById('header-next-buses');
    var nextPerStop={};
    buses.forEach(function(b){ if(!nextPerStop[b.stopId]&&b.h*60+b.m>=nowMin) nextPerStop[b.stopId]=b; });
    var nextList=Object.keys(nextPerStop).map(function(k){return nextPerStop[k];})
      .sort(function(a,b){return a.h*60+a.m-(b.h*60+b.m);});

    if(headerNext){
      if(nextList.length===0){ headerNext.innerHTML='<span class="hn-empty">本日の運行終了</span>'; }
      else{
        headerNext.innerHTML=nextList.map(function(b){
          var diff=b.h*60+b.m-nowMin, cls=b.company==='city'?'hn-city':'hn-rinko';
          var rem=diff===0?'今すぐ':'あと'+diff+'分';
          return '<div class="hn-card '+cls+'"><div class="hn-time">'+pad(b.h)+':'+pad(b.m)+'</div><div class="hn-remain">'+rem+'</div><div class="hn-label">'+b.label+'</div></div>';
        }).join('');
      }
    }

    var container=document.getElementById('list-container');
    var emptyMsg=document.getElementById('empty-msg');
    if(!container||!emptyMsg) return;

    var grouped={};
    buses.forEach(function(b){ if(!grouped[b.h]) grouped[b.h]=[]; grouped[b.h].push(b); });
    container.innerHTML='';
    var hasUpcoming=false;

    Object.keys(grouped).sort(function(a,b){return parseInt(a)-parseInt(b);}).forEach(function(hStr){
      var h=parseInt(hStr), hourDiv=document.createElement('div');
      hourDiv.className='hour-group';
      hourDiv.innerHTML='<div class="hour-label">'+h+'時</div>';
      grouped[hStr].forEach(function(b){
        var bMin=b.h*60+b.m, diff=bMin-nowMin;
        var isPast=diff<0, isNext=!hasUpcoming&&diff>=0, isSoon=diff>=0&&diff<=3;
        if(isNext) hasUpcoming=true;
        var remStr='', remCls='row-remain';
        if(diff<0){remStr='発車済';remCls+=' past-label';}
        else if(diff===0){remStr='🚌 今すぐ';remCls+=' now-label';}
        else if(diff<=60){remStr=diff+'分後';}
        else{remStr=Math.floor(diff/60)+'h'+(diff%60>0?diff%60+'m':'');}
        var row=document.createElement('div');
        row.className='bus-row '+b.company+(isPast?' past':'')+(isNext?' next-bus':'')+(isSoon&&!isPast?' soon':'');
        row.innerHTML='<div class="row-time">'+pad(b.h)+':'+pad(b.m)+'</div>'+
          '<div class="row-info"><span class="row-company">'+b.label+'</span><div class="row-stop">'+b.stop+'</div></div>'+
          '<div class="'+remCls+'">'+remStr+'</div>';
        hourDiv.appendChild(row);
      });
      container.appendChild(hourDiv);
    });

    emptyMsg.style.display=(!hasUpcoming&&buses.length>0)?'block':'none';
    var nextRow=container.querySelector('.next-bus');
    if(nextRow) setTimeout(function(){nextRow.scrollIntoView({behavior:'smooth',block:'center'});},300);
    dbLog('render',pad(now.getHours())+':'+pad(now.getMinutes())+' type='+type+' stops='+activeStops.join(','));
  } catch(e){
    dbLog('render ERROR',e.message,true);
    dbLog('stack',e.stack?e.stack.split('\n').slice(0,3).join(' | '):'none',true);
    var btn=document.getElementById('debug-toggle');
    if(btn){btn.textContent='🔴 ERROR';btn.style.background='#dc2626';}
  }
}

var dbLogs=[];
function dbLog(key,val,isErr){
  dbLogs.push({key:key,val:String(val),isErr:!!isErr});
  var el=document.getElementById('debug-log'); if(!el) return;
  el.innerHTML=dbLogs.map(function(l){
    return '<div class="dbg-row"><span class="dbg-key">'+l.key+'</span><span class="dbg-val'+(l.isErr?' dbg-err':'')+'">'+l.val.replace(/</g,'&lt;')+'</span></div>';
  }).join('');
}
function toggleDebug(){
  var panel=document.getElementById('debug-panel'), btn=document.getElementById('debug-toggle');
  var show=panel.style.display!=='block';
  panel.style.display=show?'block':'none';
  btn.classList.toggle('active',show);
}
window.onerror=function(msg,src,line){
  dbLog('JS ERROR',msg+' line:'+line,true);
  var bt=document.getElementById('debug-toggle');
  if(bt){bt.textContent='🔴 ERROR';bt.style.background='#dc2626';}
};

render();
initGPS();
setInterval(render,10000);
setInterval(function(){ var now=new Date(); document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes()); },1000);
</script>
</body>
